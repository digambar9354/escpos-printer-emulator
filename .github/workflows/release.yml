name: Build & Release

# Builds standalone binaries for Windows and Linux.
# - On every push/PR: uploads binaries as downloadable workflow artifacts.
# - On a version tag (e.g. v1.0.0): also publishes them to a GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: target/release/escpos_emulator.exe
            artifact: escpos-printer-emulator-windows-x86_64.exe
          - os: ubuntu-latest
            bin: target/release/escpos_emulator
            artifact: escpos-printer-emulator-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libxkbcommon-dev libwayland-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Stage binary
        shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.artifact }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
